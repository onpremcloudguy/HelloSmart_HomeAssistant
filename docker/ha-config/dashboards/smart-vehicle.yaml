# Smart Vehicle Dashboard (Enhanced)
# Requires: mushroom cards (HACS), card-mod (HACS)
#
# CUSTOMIZATION:
#   1. Find and replace "234118" with your vehicle's last 6 VIN digits.
#   2. Find and replace "HESCA2C42RS234118" with your full VIN.
# Example: VIN WMEEJ9AA1NR123456 → replace "234118" with "123456" and full VIN with yours.

title: Smart Vehicle
views:
  - title: Smart Vehicle
    path: smart-vehicle
    cards:
      # ──────────────────────────────────────────────
      # Hero Card — Vehicle Overview with Image
      # ──────────────────────────────────────────────
      - type: custom:mushroom-template-card
        primary: Smart #3
        secondary: >-
          {{ states('sensor.cm590_hc11_performance_4wd_rhd_apac_power_mode') | title }}
          · {{ 'Online' if is_state('binary_sensor.cm590_hc11_performance_4wd_rhd_apac_vehicle_online', 'on') else 'Offline' }}
        icon: mdi:car
        entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_vehicle_online
        picture: /local/hello_smart/HESCA2C42RS234118_side.png
        layout: horizontal
        card_mod:
          style: |
            ha-card {
              background: linear-gradient(135deg, #1E1E1E 0%, #2A2A2A 100%);
              border: 1px solid #333;
              --primary-text-color: #FFFFFF;
              --secondary-text-color: #B3B3B3;
            }
            mushroom-shape-icon {
              display: none;
            }
      - type: custom:mushroom-chips-card
        chips:
          - type: entity
            entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_driver_door_lock
            icon: >-
              {{ 'mdi:lock' if is_state('binary_sensor.cm590_hc11_performance_4wd_rhd_apac_driver_door_lock', 'locked') else 'mdi:lock-open' }}
            content_info: name
          - type: entity
            entity: sensor.cm590_hc11_performance_4wd_rhd_apac_charging_status
            icon: mdi:ev-station
            content_info: state
          - type: entity
            entity: sensor.cm590_hc11_performance_4wd_rhd_apac_power_mode
            icon: mdi:power
            content_info: state
          - type: entity
            entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_vehicle_online
            icon: >-
              {{ 'mdi:wifi' if is_state('binary_sensor.cm590_hc11_performance_4wd_rhd_apac_vehicle_online', 'on') else 'mdi:wifi-off' }}
            content_info: name
        card_mod:
          style: |
            ha-card {
              --chip-background: #2A2A2A;
              --chip-border-color: #444;
            }

      # ──────────────────────────────────────────────
      # Battery & Range
      # ──────────────────────────────────────────────
      - type: markdown
        content: "## 🔋 Battery & Range"
        card_mod:
          style: |
            ha-card {
              background: transparent;
              box-shadow: none;
              border: none;
              --primary-text-color: #0078D4;
            }
      - type: custom:mushroom-template-card
        primary: Battery Level
        secondary: >-
          {{ states('sensor.cm590_hc11_performance_4wd_rhd_apac_battery_level') }}%
        icon: mdi:battery
        entity: sensor.cm590_hc11_performance_4wd_rhd_apac_battery_level
        icon_color: >-
          {% set level = states('sensor.cm590_hc11_performance_4wd_rhd_apac_battery_level') | int(0) %}
          {% if level > 60 %}green
          {% elif level > 20 %}orange
          {% else %}red{% endif %}
        card_mod:
          style: |
            ha-card {
              background: #1E1E1E;
              border: 1px solid #333;
              --primary-text-color: #FFFFFF;
              --secondary-text-color: #B3B3B3;
            }
      - type: entities
        entities:
          - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_estimated_range
            name: Range Remaining
            icon: mdi:map-marker-distance
          - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_range_at_full_charge
            name: Range at Full Charge
            icon: mdi:map-marker-check
        card_mod:
          style: |
            ha-card {
              background: #1E1E1E;
              border: 1px solid #333;
              --primary-text-color: #FFFFFF;
              --secondary-text-color: #B3B3B3;
            }

      # ──────────────────────────────────────────────
      # Charging Status
      # ──────────────────────────────────────────────
      - type: markdown
        content: "## ⚡ Charging Status"
        card_mod:
          style: |
            ha-card {
              background: transparent;
              box-shadow: none;
              border: none;
              --primary-text-color: #0078D4;
            }
      - type: vertical-stack
        cards:
          - type: custom:mushroom-entity-card
            entity: sensor.cm590_hc11_performance_4wd_rhd_apac_charging_status
            name: Charging Status
            icon: mdi:ev-station
            card_mod:
              style: |
                ha-card {
                  background: #1E1E1E;
                  border: 1px solid #333;
                  --primary-text-color: #FFFFFF;
                  --secondary-text-color: #B3B3B3;
                }
          - type: custom:mushroom-chips-card
            chips:
              - type: entity
                entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_charger
                icon: mdi:power-plug
                content_info: name
              - type: entity
                entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_ac_charge_lid
                icon: mdi:ev-plug-type2
                content_info: name
              - type: entity
                entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_dc_charge_lid
                icon: mdi:ev-plug-ccs2
                content_info: name
            card_mod:
              style: |
                ha-card {
                  --chip-background: #2A2A2A;
                  --chip-border-color: #444;
                }
          - type: entities
            entities:
              - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_charging_voltage
                name: Voltage
                icon: mdi:flash
              - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_charging_current
                name: AC Current
                icon: mdi:current-ac
              - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_dc_charging_current
                name: DC Current
                icon: mdi:current-dc
              - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_charging_power
                name: Power
                icon: mdi:lightning-bolt
              - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_time_to_full_charge
                name: Time to Full
                icon: mdi:timer-sand
            card_mod:
              style: |
                ha-card {
                  background: #1E1E1E;
                  border: 1px solid #333;
                  --primary-text-color: #FFFFFF;
                  --secondary-text-color: #B3B3B3;
                }
          - type: custom:mushroom-entity-card
            entity: number.cm590_hc11_performance_4wd_rhd_apac_charge_target
            name: Target SOC
            icon: mdi:battery-charging-high
            card_mod:
              style: |
                ha-card {
                  background: #1E1E1E;
                  border: 1px solid #333;
                  --primary-text-color: #FFFFFF;
                  --secondary-text-color: #B3B3B3;
                }
          - type: entities
            entities:
              - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_scheduled_charging
                name: Schedule Status
                icon: mdi:calendar-clock
              - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_charge_target
                name: Schedule Target SOC
                icon: mdi:battery-heart
              - entity: time.cm590_hc11_performance_4wd_rhd_apac_charging_start_time
                name: Charging Start Time
                icon: mdi:clock-start
              - entity: time.cm590_hc11_performance_4wd_rhd_apac_charging_end_time
                name: Charging End Time
                icon: mdi:clock-end
            card_mod:
              style: |
                ha-card {
                  background: #1E1E1E;
                  border: 1px solid #333;
                  --primary-text-color: #FFFFFF;
                  --secondary-text-color: #B3B3B3;
                }
          - type: custom:mushroom-entity-card
            entity: switch.cm590_hc11_performance_4wd_rhd_apac_charging
            name: Charging
            icon: mdi:ev-station
            card_mod:
              style: |
                ha-card {
                  background: #1E1E1E;
                  border: 1px solid #333;
                  --primary-text-color: #FFFFFF;
                  --secondary-text-color: #B3B3B3;
                }

      # ──────────────────────────────────────────────
      # Lock & Security
      # ──────────────────────────────────────────────
      - type: markdown
        content: "## 🔒 Lock & Security"
        card_mod:
          style: |
            ha-card {
              background: transparent;
              box-shadow: none;
              border: none;
              --primary-text-color: #0078D4;
            }
      - type: vertical-stack
        cards:
          - type: custom:mushroom-entity-card
            entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_driver_door_lock
            name: Door Lock
            card_mod:
              style: |
                ha-card {
                  background: #1E1E1E;
                  border: 1px solid #333;
                  --primary-text-color: #FFFFFF;
                  --secondary-text-color: #B3B3B3;
                }
          - type: custom:hello-smart-vehicle-card
            entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_driver_door
            show_windows: true
            show_locks: true

      # ──────────────────────────────────────────────
      # Tyre Status
      # ──────────────────────────────────────────────
      - type: markdown
        content: "## 🛞 Tyre Status"
        card_mod:
          style: |
            ha-card {
              background: transparent;
              box-shadow: none;
              border: none;
              --primary-text-color: #0078D4;
            }
      - type: vertical-stack
        cards:
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: Front Left
                secondary: >-
                  {{ states('sensor.cm590_hc11_performance_4wd_rhd_apac_tyre_pressure_front_rightont_left') }} kPa
                  · {{ states('sensor.cm590_hc11_performance_4wd_rhd_apac_tyre_temperature_front_left') }}°C
                icon: mdi:tire
                entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_tyre_warning_front_rightont_left
                icon_color: >-
                  {{ 'red' if is_state('binary_sensor.cm590_hc11_performance_4wd_rhd_apac_tyre_warning_front_rightont_left', 'on') else 'green' }}
                card_mod:
                  style: |
                    ha-card {
                      background: #1E1E1E;
                      border: 1px solid {{ '#F44336' if is_state('binary_sensor.cm590_hc11_performance_4wd_rhd_apac_tyre_warning_front_rightont_left', 'on') else '#333' }};
                      --primary-text-color: #FFFFFF;
                      --secondary-text-color: #B3B3B3;
                    }
              - type: custom:mushroom-template-card
                primary: Front Right
                secondary: >-
                  {{ states('sensor.cm590_hc11_performance_4wd_rhd_apac_tyre_pressure_front_right') }} kPa
                  · {{ states('sensor.cm590_hc11_performance_4wd_rhd_apac_tyre_temperature_front_right') }}°C
                icon: mdi:tire
                entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_tyre_warning_front_right
                icon_color: >-
                  {{ 'red' if is_state('binary_sensor.cm590_hc11_performance_4wd_rhd_apac_tyre_warning_front_right', 'on') else 'green' }}
                card_mod:
                  style: |
                    ha-card {
                      background: #1E1E1E;
                      border: 1px solid {{ '#F44336' if is_state('binary_sensor.cm590_hc11_performance_4wd_rhd_apac_tyre_warning_front_right', 'on') else '#333' }};
                      --primary-text-color: #FFFFFF;
                      --secondary-text-color: #B3B3B3;
                    }
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: Rear Left
                secondary: >-
                  {{ states('sensor.cm590_hc11_performance_4wd_rhd_apac_tyre_pressure_rear_left') }} kPa
                  · {{ states('sensor.cm590_hc11_performance_4wd_rhd_apac_tyre_temperature_rear_left') }}°C
                icon: mdi:tire
                entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_tyre_warning_rear_left
                icon_color: >-
                  {{ 'red' if is_state('binary_sensor.cm590_hc11_performance_4wd_rhd_apac_tyre_warning_rear_left', 'on') else 'green' }}
                card_mod:
                  style: |
                    ha-card {
                      background: #1E1E1E;
                      border: 1px solid {{ '#F44336' if is_state('binary_sensor.cm590_hc11_performance_4wd_rhd_apac_tyre_warning_rear_left', 'on') else '#333' }};
                      --primary-text-color: #FFFFFF;
                      --secondary-text-color: #B3B3B3;
                    }
              - type: custom:mushroom-template-card
                primary: Rear Right
                secondary: >-
                  {{ states('sensor.cm590_hc11_performance_4wd_rhd_apac_tyre_pressure_rear_right') }} kPa
                  · {{ states('sensor.cm590_hc11_performance_4wd_rhd_apac_tyre_temperature_rear_right') }}°C
                icon: mdi:tire
                entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_tyre_warning_rear_right
                icon_color: >-
                  {{ 'red' if is_state('binary_sensor.cm590_hc11_performance_4wd_rhd_apac_tyre_warning_rear_right', 'on') else 'green' }}
                card_mod:
                  style: |
                    ha-card {
                      background: #1E1E1E;
                      border: 1px solid {{ '#F44336' if is_state('binary_sensor.cm590_hc11_performance_4wd_rhd_apac_tyre_warning_rear_right', 'on') else '#333' }};
                      --primary-text-color: #FFFFFF;
                      --secondary-text-color: #B3B3B3;
                    }

      # ──────────────────────────────────────────────
      # Windows
      # ──────────────────────────────────────────────
      - type: markdown
        content: "## 🪟 Windows"
        card_mod:
          style: |
            ha-card {
              background: transparent;
              box-shadow: none;
              border: none;
              --primary-text-color: #0078D4;
            }
      - type: vertical-stack
        cards:
          - type: custom:mushroom-entity-card
            entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_driver_window
            name: Driver Window
            icon: mdi:car-door
            secondary_info: >-
              Position: {{ states('sensor.cm590_hc11_performance_4wd_rhd_apac_driver_window_position') }}%
            card_mod:
              style: |
                ha-card {
                  background: #1E1E1E;
                  border: 1px solid #333;
                  --primary-text-color: #FFFFFF;
                  --secondary-text-color: #B3B3B3;
                }
          - type: custom:mushroom-entity-card
            entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_passenger_window
            name: Passenger Window
            icon: mdi:car-door
            secondary_info: >-
              Position: {{ states('sensor.cm590_hc11_performance_4wd_rhd_apac_passenger_window_position') }}%
            card_mod:
              style: |
                ha-card {
                  background: #1E1E1E;
                  border: 1px solid #333;
                  --primary-text-color: #FFFFFF;
                  --secondary-text-color: #B3B3B3;
                }
          - type: custom:mushroom-entity-card
            entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_rear_left_window
            name: Rear Left Window
            icon: mdi:car-door
            secondary_info: >-
              Position: {{ states('sensor.cm590_hc11_performance_4wd_rhd_apac_rear_left_window_position') }}%
            card_mod:
              style: |
                ha-card {
                  background: #1E1E1E;
                  border: 1px solid #333;
                  --primary-text-color: #FFFFFF;
                  --secondary-text-color: #B3B3B3;
                }
          - type: custom:mushroom-entity-card
            entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_rear_right_window
            name: Rear Right Window
            icon: mdi:car-door
            secondary_info: >-
              Position: {{ states('sensor.cm590_hc11_performance_4wd_rhd_apac_rear_right_window_position') }}%
            card_mod:
              style: |
                ha-card {
                  background: #1E1E1E;
                  border: 1px solid #333;
                  --primary-text-color: #FFFFFF;
                  --secondary-text-color: #B3B3B3;
                }
          - type: conditional
            conditions:
              - entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_sunroof
                state_not: unavailable
            card:
              type: custom:mushroom-entity-card
              entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_sunroof
              name: Sunroof
              icon: mdi:car-select
              secondary_info: >-
                Position: {{ states('sensor.cm590_hc11_performance_4wd_rhd_apac_sunroof_position') }}%
              card_mod:
                style: |
                  ha-card {
                    background: #1E1E1E;
                    border: 1px solid #333;
                    --primary-text-color: #FFFFFF;
                    --secondary-text-color: #B3B3B3;
                  }
          - type: custom:mushroom-entity-card
            entity: button.cm590_hc11_performance_4wd_rhd_apac_close_windows
            name: Close All Windows
            icon: mdi:window-closed
            tap_action:
              action: toggle
            card_mod:
              style: |
                ha-card {
                  background: #1E1E1E;
                  border: 2px solid #0078D4;
                  --primary-text-color: #FFFFFF;
                  --secondary-text-color: #B3B3B3;
                }

      # ──────────────────────────────────────────────
      # Service & Maintenance
      # ──────────────────────────────────────────────
      - type: markdown
        content: "## 🔧 Service & Maintenance"
        card_mod:
          style: |
            ha-card {
              background: transparent;
              box-shadow: none;
              border: none;
              --primary-text-color: #0078D4;
            }
      - type: vertical-stack
        cards:
          - type: custom:mushroom-entity-card
            entity: sensor.cm590_hc11_performance_4wd_rhd_apac_odometer
            name: Odometer
            icon: mdi:counter
            card_mod:
              style: |
                ha-card {
                  background: #1E1E1E;
                  border: 1px solid #333;
                  --primary-text-color: #FFFFFF;
                  --secondary-text-color: #B3B3B3;
                }
          - type: custom:mushroom-chips-card
            chips:
              - type: entity
                entity: sensor.cm590_hc11_performance_4wd_rhd_apac_service_due_in
                icon: mdi:calendar-clock
                content_info: state
              - type: entity
                entity: sensor.cm590_hc11_performance_4wd_rhd_apac_service_due_distance
                icon: mdi:road-variant
                content_info: state
              - type: entity
                entity: sensor.cm590_hc11_performance_4wd_rhd_apac_engine_hours_to_service
                icon: mdi:engine
                content_info: state
            card_mod:
              style: |
                ha-card {
                  --chip-background: #2A2A2A;
                  --chip-border-color: #444;
                }
          - type: custom:mushroom-entity-card
            entity: sensor.cm590_hc11_performance_4wd_rhd_apac_service_warning
            name: Service Warning
            icon: mdi:alert-circle
            card_mod:
              style: |
                ha-card {
                  background: #1E1E1E;
                  border: 1px solid #333;
                  --primary-text-color: #FFFFFF;
                  --secondary-text-color: #B3B3B3;
                }
          - type: entities
            title: Fluid Levels
            entities:
              - entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_washer_fluid
                name: Washer Fluid
                icon: mdi:wiper-wash
              - entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_brake_fluid
                name: Brake Fluid
                icon: mdi:car-brake-fluid-level
              - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_coolant_level
                name: Engine Coolant
                icon: mdi:coolant-temperature
            card_mod:
              style: |
                ha-card {
                  background: #1E1E1E;
                  border: 1px solid #333;
                  --primary-text-color: #FFFFFF;
                  --secondary-text-color: #B3B3B3;
                }
          - type: entities
            title: Firmware
            entities:
              - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_firmware_version
                name: Current Firmware
                icon: mdi:cellphone-arrow-down
              - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_available_firmware_version
                name: Target Firmware
                icon: mdi:cellphone-arrow-up
              - entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_firmware_update_available
                name: Update Available
                icon: mdi:update
            card_mod:
              style: |
                ha-card {
                  background: #1E1E1E;
                  border: 1px solid #333;
                  --primary-text-color: #FFFFFF;
                  --secondary-text-color: #B3B3B3;
                }
          - type: entities
            title: Diagnostics
            entities:
              - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_diagnostic_status
                name: Diagnostic Status
                icon: mdi:stethoscope
              - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_diagnostic_trouble_code
                name: Diagnostic Code
                icon: mdi:barcode
            card_mod:
              style: |
                ha-card {
                  background: #1E1E1E;
                  border: 1px solid #333;
                  --primary-text-color: #FFFFFF;
                  --secondary-text-color: #B3B3B3;
                }
