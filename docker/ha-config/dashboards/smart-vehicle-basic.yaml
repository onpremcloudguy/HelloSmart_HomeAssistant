# Smart Vehicle Dashboard (Basic)
# Uses only built-in Home Assistant cards — no HACS required.
#
# CUSTOMIZATION:
#   1. Find and replace "234118" with your vehicle's last 6 VIN digits.
#   2. Find and replace "HESCA2C42RS234118" with your full VIN.
# Example: VIN WMEEJ9AA1NR123456 → replace "234118" with "123456" and full VIN with yours.

title: Smart Vehicle (Basic)
views:
  - title: Smart Vehicle (Basic)
    path: smart-vehicle-basic
    cards:
      # ──────────────────────────────────────────────
      # Hero Card — Vehicle Overview with Image
      # ──────────────────────────────────────────────
      - type: picture-entity
        entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_vehicle_online
        name: Smart #3
        image: /local/hello_smart/HESCA2C42RS234118_side.png
        show_name: true
        show_state: true
      - type: entities
        title: Vehicle Status
        entities:
          - entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_driver_door_lock
            name: Door Lock
            icon: mdi:lock
          - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_charging_status
            name: Charging Status
            icon: mdi:ev-station
          - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_power_mode
            name: Power Mode
            icon: mdi:power
          - entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_vehicle_online
            name: Online
            icon: mdi:wifi

      # ──────────────────────────────────────────────
      # Battery & Range
      # ──────────────────────────────────────────────
      - type: gauge
        entity: sensor.cm590_hc11_performance_4wd_rhd_apac_battery_level
        name: Battery Level
        min: 0
        max: 100
        severity:
          green: 60
          yellow: 20
          red: 0
      - type: entities
        title: Range
        entities:
          - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_estimated_range
            name: Range Remaining
            icon: mdi:map-marker-distance
          - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_range_at_full_charge
            name: Range at Full Charge
            icon: mdi:map-marker-check

      # ──────────────────────────────────────────────
      # Charging Status
      # ──────────────────────────────────────────────
      - type: entities
        title: Charging
        entities:
          - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_charging_status
            name: Status
            icon: mdi:ev-station
          - entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_charger
            name: Charger Connected
            icon: mdi:power-plug
          - entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_ac_charge_lid
            name: AC Charge Lid
            icon: mdi:ev-plug-type2
          - entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_dc_charge_lid
            name: DC Charge Lid
            icon: mdi:ev-plug-ccs2
          - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_charging_voltage
            name: Voltage
            icon: mdi:flash
          - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_charging_current
            name: AC Current
            icon: mdi:current-ac
          - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_dc_charging_current
            name: DC Current
            icon: mdi:current-dc
          - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_charging_power
            name: Power
            icon: mdi:lightning-bolt
          - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_time_to_full_charge
            name: Time to Full
            icon: mdi:timer-sand
      - type: entities
        title: Charging Controls
        entities:
          - entity: number.cm590_hc11_performance_4wd_rhd_apac_charge_target
            name: Target SOC
            icon: mdi:battery-charging-high
          - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_scheduled_charging
            name: Schedule Status
            icon: mdi:calendar-clock
          - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_charge_target
            name: Schedule Target SOC
            icon: mdi:battery-heart
          - entity: time.cm590_hc11_performance_4wd_rhd_apac_charging_start_time
            name: Charging Start Time
            icon: mdi:clock-start
          - entity: time.cm590_hc11_performance_4wd_rhd_apac_charging_end_time
            name: Charging End Time
            icon: mdi:clock-end
          - entity: switch.cm590_hc11_performance_4wd_rhd_apac_charging
            name: Charging
            icon: mdi:ev-station

      # ──────────────────────────────────────────────
      # Lock & Security
      # ──────────────────────────────────────────────
      - type: entities
        title: Lock & Security
        entities:
          - entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_driver_door_lock
            name: Door Lock
            icon: mdi:lock
          - entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_driver_door
            name: Driver Door
            icon: mdi:car-door
          - entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_passenger_door
            name: Passenger Door
            icon: mdi:car-door
          - entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_rear_left_door
            name: Rear Left Door
            icon: mdi:car-door
          - entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_rear_right_door
            name: Rear Right Door
            icon: mdi:car-door
          - entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_boot
            name: Trunk
            icon: mdi:car-back
          - entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_bonnet
            name: Engine Hood
            icon: mdi:car
          - entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_driver_door_lock
            name: Driver Lock
            icon: mdi:car-door-lock
          - entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_passenger_door_lock
            name: Passenger Lock
            icon: mdi:car-door-lock
          - entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_rear_left_door_lock
            name: Rear Left Lock
            icon: mdi:car-door-lock
          - entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_rear_right_door_lock
            name: Rear Right Lock
            icon: mdi:car-door-lock
          - entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_boot_lock
            name: Trunk Lock
            icon: mdi:lock

      # ──────────────────────────────────────────────
      # Tyre Status
      # ──────────────────────────────────────────────
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## Tyre Status"
          - type: horizontal-stack
            cards:
              - type: entities
                title: Front Left
                entities:
                  - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_tyre_pressure_front_rightont_left
                    name: Pressure
                    icon: mdi:tire
                  - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_tyre_temperature_front_left
                    name: Temperature
                    icon: mdi:thermometer
                  - entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_tyre_warning_front_rightont_left
                    name: Warning
                    icon: mdi:alert
              - type: entities
                title: Front Right
                entities:
                  - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_tyre_pressure_front_right
                    name: Pressure
                    icon: mdi:tire
                  - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_tyre_temperature_front_right
                    name: Temperature
                    icon: mdi:thermometer
                  - entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_tyre_warning_front_right
                    name: Warning
                    icon: mdi:alert
          - type: horizontal-stack
            cards:
              - type: entities
                title: Rear Left
                entities:
                  - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_tyre_pressure_rear_left
                    name: Pressure
                    icon: mdi:tire
                  - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_tyre_temperature_rear_left
                    name: Temperature
                    icon: mdi:thermometer
                  - entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_tyre_warning_rear_left
                    name: Warning
                    icon: mdi:alert
              - type: entities
                title: Rear Right
                entities:
                  - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_tyre_pressure_rear_right
                    name: Pressure
                    icon: mdi:tire
                  - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_tyre_temperature_rear_right
                    name: Temperature
                    icon: mdi:thermometer
                  - entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_tyre_warning_rear_right
                    name: Warning
                    icon: mdi:alert

      # ──────────────────────────────────────────────
      # Windows
      # ──────────────────────────────────────────────
      - type: entities
        title: Windows
        entities:
          - entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_driver_window
            name: Driver Window
            icon: mdi:car-door
          - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_driver_window_position
            name: Driver Position
            icon: mdi:arrow-up-down
          - entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_passenger_window
            name: Passenger Window
            icon: mdi:car-door
          - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_passenger_window_position
            name: Passenger Position
            icon: mdi:arrow-up-down
          - entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_rear_left_window
            name: Rear Left Window
            icon: mdi:car-door
          - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_rear_left_window_position
            name: Rear Left Position
            icon: mdi:arrow-up-down
          - entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_rear_right_window
            name: Rear Right Window
            icon: mdi:car-door
          - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_rear_right_window_position
            name: Rear Right Position
            icon: mdi:arrow-up-down
          - type: conditional
            conditions:
              - entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_sunroof
                state_not: unavailable
            row:
              entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_sunroof
              name: Sunroof
              icon: mdi:car-select
          - type: conditional
            conditions:
              - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_sunroof_position
                state_not: unavailable
            row:
              entity: sensor.cm590_hc11_performance_4wd_rhd_apac_sunroof_position
              name: Sunroof Position
              icon: mdi:arrow-up-down
          - entity: button.cm590_hc11_performance_4wd_rhd_apac_close_windows
            name: Close All Windows
            icon: mdi:window-closed

      # ──────────────────────────────────────────────
      # Service & Maintenance
      # ──────────────────────────────────────────────
      - type: entities
        title: Service & Maintenance
        entities:
          - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_odometer
            name: Odometer
            icon: mdi:counter
          - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_service_due_in
            name: Days to Service
            icon: mdi:calendar-clock
          - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_service_due_distance
            name: Distance to Service
            icon: mdi:road-variant
          - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_engine_hours_to_service
            name: Engine Hours to Service
            icon: mdi:engine
          - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_service_warning
            name: Service Warning
            icon: mdi:alert-circle
          - entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_washer_fluid
            name: Washer Fluid
            icon: mdi:wiper-wash
          - entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_brake_fluid
            name: Brake Fluid
            icon: mdi:car-brake-fluid-level
          - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_coolant_level
            name: Engine Coolant
            icon: mdi:coolant-temperature
          - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_firmware_version
            name: Current Firmware
            icon: mdi:cellphone-arrow-down
          - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_available_firmware_version
            name: Target Firmware
            icon: mdi:cellphone-arrow-up
          - entity: binary_sensor.cm590_hc11_performance_4wd_rhd_apac_firmware_update_available
            name: Update Available
            icon: mdi:update
          - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_diagnostic_status
            name: Diagnostic Status
            icon: mdi:stethoscope
          - entity: sensor.cm590_hc11_performance_4wd_rhd_apac_diagnostic_trouble_code
            name: Diagnostic Code
            icon: mdi:barcode
